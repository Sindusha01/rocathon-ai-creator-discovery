services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: rocathon-postgres
    restart: always

    environment:
      POSTGRES_DB: rocathon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - rocathon_pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rocathon"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rocathon_pgdata: